<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>A little question for you ♡</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;500;600;700&family=Caveat:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'Quicksand', sans-serif;
    color: #6b3a52;
    background: linear-gradient(180deg, #ffe0ef 0%, #ffd1e3 50%, #ffc0d9 100%);
  }

  /* floating hearts background */
  .heart-bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .heart-bg span {
    position: absolute;
    bottom: -40px;
    color: #ffb3d1;
    opacity: 0.7;
    font-size: 22px;
    animation: float-up linear infinite;
    text-shadow: 0 0 6px rgba(255, 192, 217, 0.6);
  }
  @keyframes float-up {
    0%   { transform: translateY(0) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.8; }
    100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
  }

  /* clouds */
  .cloud {
    position: fixed;
    background: rgba(255, 255, 255, 0.6);
    border-radius: 50%;
    filter: blur(2px);
    z-index: 0;
    pointer-events: none;
  }
  .cloud::before, .cloud::after {
    content: "";
    position: absolute;
    background: inherit;
    border-radius: 50%;
  }
  .cloud.c1 { width: 180px; height: 60px; top: 8%; left: -50px; animation: drift 60s linear infinite; }
  .cloud.c1::before { width: 90px; height: 90px; top: -45px; left: 30px; }
  .cloud.c1::after  { width: 60px; height: 60px; top: -25px; left: 100px; }
  .cloud.c2 { width: 140px; height: 50px; top: 22%; right: -40px; animation: drift-rev 80s linear infinite; }
  .cloud.c2::before { width: 70px; height: 70px; top: -35px; left: 20px; }
  .cloud.c2::after  { width: 50px; height: 50px; top: -20px; left: 75px; }
  @keyframes drift     { from { transform: translateX(0); } to { transform: translateX(120vw); } }
  @keyframes drift-rev { from { transform: translateX(0); } to { transform: translateX(-120vw); } }

  /* main card */
  .stage {
    position: relative;
    z-index: 2;
    height: 100%;
    display: grid;
    place-items: center;
    padding: 24px;
  }

  .card {
    position: relative;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 3px solid #ffb3d1;
    border-radius: 32px;
    padding: 48px 56px;
    text-align: center;
    box-shadow:
      0 0 0 6px rgba(255, 255, 255, 0.6),
      0 20px 40px rgba(255, 105, 165, 0.25),
      0 0 60px rgba(255, 182, 213, 0.6);
    max-width: 560px;
    width: 100%;
    animation: pop-in 0.8s cubic-bezier(.22,1.4,.36,1) both;
  }

  @keyframes pop-in {
    0%   { transform: scale(0.7) rotate(-3deg); opacity: 0; }
    100% { transform: scale(1)   rotate(0deg);  opacity: 1; }
  }

  .card::before {
    content: "♡";
    position: absolute;
    top: -28px; left: 50%;
    transform: translateX(-50%);
    background: #ff7eb6;
    color: white;
    width: 56px; height: 56px;
    border-radius: 50%;
    display: grid; place-items: center;
    font-size: 28px;
    box-shadow: 0 4px 14px rgba(255, 126, 182, 0.5);
    animation: heartbeat 1.6s ease-in-out infinite;
  }
  @keyframes heartbeat {
    0%, 100% { transform: translateX(-50%) scale(1); }
    25%      { transform: translateX(-50%) scale(1.18); }
    50%      { transform: translateX(-50%) scale(0.95); }
    75%      { transform: translateX(-50%) scale(1.12); }
  }

  h1 {
    font-family: 'Pacifico', cursive;
    font-size: clamp(34px, 6vw, 54px);
    color: #ff5fa2;
    margin-bottom: 8px;
    text-shadow: 2px 2px 0 #fff, 4px 4px 0 rgba(255, 159, 200, 0.4);
    line-height: 1.1;
  }

  .subtitle {
    font-family: 'Caveat', cursive;
    font-size: clamp(20px, 2.6vw, 26px);
    color: #c25288;
    margin-bottom: 36px;
    opacity: 0.9;
  }

  .buttons {
    display: flex;
    gap: 24px;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    min-height: 64px;
    position: relative;
  }

  button {
    font-family: 'Quicksand', sans-serif;
    font-weight: 700;
    font-size: 20px;
    border: none;
    border-radius: 999px;
    padding: 16px 36px;
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    letter-spacing: 0.5px;
  }

  .yes-btn {
    background: linear-gradient(135deg, #ff7eb6 0%, #ff5fa2 100%);
    color: white;
    box-shadow: 0 6px 0 #d9407e, 0 10px 20px rgba(255, 95, 162, 0.4);
  }
  .yes-btn:hover {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 9px 0 #d9407e, 0 14px 26px rgba(255, 95, 162, 0.5);
  }
  .yes-btn:active {
    transform: translateY(2px) scale(1.02);
    box-shadow: 0 3px 0 #d9407e, 0 6px 12px rgba(255, 95, 162, 0.4);
  }

  .no-btn {
    background: white;
    color: #c25288;
    border: 2px solid #ffb3d1;
    box-shadow: 0 4px 0 #ffb3d1, 0 6px 12px rgba(255, 179, 209, 0.4);
    position: relative;
    /* no transition once bouncing — rAF drives the motion */
    white-space: nowrap;
    will-change: left, top, transform;
  }
  .no-btn.bouncing {
    z-index: 5;
  }

  /* celebration screen */
  .celebration {
    position: fixed;
    inset: 0;
    z-index: 10;
    display: none;
    justify-items: center;
    align-content: start;
    text-align: center;
    padding: clamp(20px, 5vh, 60px) 24px 24px;
    overflow-y: auto;
    background: radial-gradient(circle at 50% 40%, #fff0f7 0%, #ffd1e3 60%, #ffb3d1 100%);
  }
  .celebration.show { display: grid; animation: fade-in 0.6s ease both; }
  @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }

  .celebration-content {
    position: relative;
    z-index: 2;
    margin: 0 auto;
  }

  .celebration h2 {
    font-family: 'Pacifico', cursive;
    font-size: clamp(34px, 6vw, 64px);
    color: #ff3d8b;
    text-shadow: 3px 3px 0 #fff, 6px 6px 0 rgba(255, 159, 200, 0.5);
    margin-bottom: 8px;
    animation: wiggle 2s ease-in-out infinite;
  }
  @keyframes wiggle {
    0%, 100% { transform: rotate(-2deg); }
    50%      { transform: rotate(2deg); }
  }

  .celebration p {
    font-family: 'Caveat', cursive;
    font-size: clamp(22px, 2.6vw, 30px);
    color: #b03a72;
    max-width: 600px;
    margin: 0 auto 20px;
    line-height: 1.35;
  }

  .big-heart {
    font-size: clamp(56px, 9vw, 96px);
    display: inline-block;
    margin-bottom: 4px;
    animation: big-beat 1.2s ease-in-out infinite;
    filter: drop-shadow(0 6px 16px rgba(255, 95, 162, 0.5));
  }
  @keyframes big-beat {
    0%, 100% { transform: scale(1); }
    25%      { transform: scale(1.2); }
    50%      { transform: scale(0.95); }
    75%      { transform: scale(1.15); }
  }

  /* date option cards */
  .date-options {
    display: grid;
    grid-template-columns: repeat(2, minmax(180px, 1fr));
    gap: 16px;
    max-width: 520px;
    margin: 8px auto 0;
  }
  .date-option {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 18px 14px;
    border-radius: 24px;
    border: 3px solid #ffb3d1;
    background: rgba(255, 255, 255, 0.85);
    color: #b03a72;
    font-family: 'Quicksand', sans-serif;
    cursor: pointer;
    box-shadow: 0 6px 0 #ffb3d1, 0 10px 18px rgba(255, 95, 162, 0.18);
    transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    animation: card-pop 0.5s cubic-bezier(.22,1.4,.36,1) both;
  }
  .date-option:nth-child(1) { animation-delay: 0.05s; }
  .date-option:nth-child(2) { animation-delay: 0.15s; }
  .date-option:nth-child(3) { animation-delay: 0.25s; }
  .date-option:nth-child(4) { animation-delay: 0.35s; }
  @keyframes card-pop {
    0%   { transform: translateY(20px) scale(0.85); opacity: 0; }
    100% { transform: translateY(0)    scale(1);    opacity: 1; }
  }
  .date-option:hover {
    transform: translateY(-4px) scale(1.04);
    background: white;
    box-shadow: 0 10px 0 #ff7eb6, 0 14px 24px rgba(255, 95, 162, 0.3);
  }
  .date-option:active {
    transform: translateY(2px) scale(1.02);
    box-shadow: 0 3px 0 #ff7eb6, 0 6px 12px rgba(255, 95, 162, 0.3);
  }
  .date-option.chosen {
    background: linear-gradient(135deg, #ff7eb6 0%, #ff5fa2 100%);
    color: white;
    border-color: #ff5fa2;
    box-shadow: 0 6px 0 #d9407e, 0 10px 18px rgba(255, 95, 162, 0.4);
    transform: scale(1.08);
  }
  .opt-icon {
    font-size: 26px;
    color: #ff5fa2;
  }
  .date-option.chosen .opt-icon { color: white; }
  .opt-label {
    font-family: 'Pacifico', cursive;
    font-size: 22px;
    line-height: 1.1;
  }
  .opt-sub {
    font-family: 'Caveat', cursive;
    font-size: 18px;
    opacity: 0.85;
  }

  .final-message {
    margin-top: 28px;
    animation: fade-in 0.5s ease both;
  }
  .final-message p {
    font-family: 'Caveat', cursive;
    font-size: clamp(26px, 3.4vw, 38px);
    color: #b03a72;
    line-height: 1.3;
  }

  @media (max-width: 480px) {
    .date-options { grid-template-columns: 1fr; }
  }

  /* rejection modal — dramatic big red X */
  .rejection-modal {
    position: fixed;
    inset: 0;
    z-index: 20;
    display: none;
    place-items: center;
    background: rgba(255, 192, 217, 0.45);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .rejection-modal.show {
    display: grid;
    animation: fade-in 0.25s ease both;
  }

  .big-cross-overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .cross-line {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 160vmax;
    height: clamp(18px, 2.4vw, 32px);
    background: linear-gradient(90deg, #ff2d62, #ff5a8a, #ff2d62);
    border-radius: 999px;
    box-shadow:
      0 0 0 6px rgba(255, 255, 255, 0.75),
      0 0 40px rgba(255, 45, 98, 0.6);
    transform-origin: center;
  }
  .cross-line-1 {
    transform: translate(-50%, -50%) rotate(45deg) scaleX(0);
  }
  .cross-line-2 {
    transform: translate(-50%, -50%) rotate(-45deg) scaleX(0);
  }
  .rejection-modal.show .cross-line-1 {
    animation: draw-line-1 0.5s cubic-bezier(.22,1.4,.36,1) 0.05s forwards;
  }
  .rejection-modal.show .cross-line-2 {
    animation: draw-line-2 0.5s cubic-bezier(.22,1.4,.36,1) 0.22s forwards;
  }
  @keyframes draw-line-1 {
    to { transform: translate(-50%, -50%) rotate(45deg) scaleX(1); }
  }
  @keyframes draw-line-2 {
    to { transform: translate(-50%, -50%) rotate(-45deg) scaleX(1); }
  }

  .rejection-card {
    position: relative;
    z-index: 2;
    background: rgba(255, 255, 255, 0.96);
    border: 3px solid #ff5fa2;
    border-radius: 28px;
    padding: 32px 40px;
    max-width: 500px;
    text-align: center;
    box-shadow:
      0 0 0 6px rgba(255, 255, 255, 0.6),
      0 20px 40px rgba(255, 45, 98, 0.35);
    animation: card-shake 0.5s ease 0.55s both;
  }
  @keyframes card-shake {
    0%   { transform: translateX(0); }
    20%  { transform: translateX(-10px); }
    40%  { transform: translateX(10px); }
    60%  { transform: translateX(-7px); }
    80%  { transform: translateX(7px); }
    100% { transform: translateX(0); }
  }
  .rejection-card p {
    font-family: 'Caveat', cursive;
    font-size: clamp(24px, 3.2vw, 34px);
    color: #b03a72;
    line-height: 1.3;
    margin-bottom: 24px;
  }
  .try-again-btn {
    background: linear-gradient(135deg, #ff7eb6 0%, #ff5fa2 100%);
    color: white;
    border: none;
    border-radius: 999px;
    padding: 14px 32px;
    font-family: 'Quicksand', sans-serif;
    font-weight: 700;
    font-size: 18px;
    cursor: pointer;
    box-shadow: 0 6px 0 #d9407e, 0 10px 20px rgba(255, 95, 162, 0.4);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .try-again-btn:hover {
    transform: translateY(-3px) scale(1.04);
    box-shadow: 0 9px 0 #d9407e, 0 14px 26px rgba(255, 95, 162, 0.5);
  }
  .try-again-btn:active {
    transform: translateY(2px);
    box-shadow: 0 3px 0 #d9407e, 0 6px 12px rgba(255, 95, 162, 0.4);
  }

  /* confetti hearts on celebration */
  .confetti {
    position: absolute;
    top: -40px;
    font-size: 28px;
    animation: fall linear forwards;
    pointer-events: none;
  }
  @keyframes fall {
    0%   { transform: translateY(0) rotate(0); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0.4; }
  }

  /* sound hint */
  .sound-hint {
    position: fixed;
    bottom: 16px;
    right: 16px;
    z-index: 5;
    background: rgba(255, 255, 255, 0.75);
    border: 2px solid #ffb3d1;
    color: #c25288;
    font-family: 'Quicksand', sans-serif;
    font-weight: 600;
    font-size: 13px;
    padding: 8px 14px;
    border-radius: 999px;
    cursor: pointer;
    transition: transform 0.2s ease, background 0.2s ease;
  }
  .sound-hint:hover { transform: scale(1.05); background: white; }

  @media (max-width: 480px) {
    .card { padding: 36px 24px; }
    button { font-size: 17px; padding: 14px 28px; }
    .buttons { gap: 14px; }
  }
</style>
</head>
<body>

<div class="heart-bg" id="heartBg"></div>
<div class="cloud c1"></div>
<div class="cloud c2"></div>

<main class="stage" id="stage">
  <div class="card">
    <h1>Will you go out with me?</h1>
    <p class="subtitle">pretty please? ♡ with a cherry on top</p>
    <div class="buttons">
      <button class="yes-btn" id="yesBtn">Yes ♡</button>
      <button class="no-btn" id="noBtn">No</button>
    </div>
  </div>
</main>

<section class="celebration" id="celebration">
  <div class="celebration-content">
    <div class="big-heart">♡</div>
    <h2 id="celebTitle">I knew it! ♡</h2>
    <p id="celebText">You just made me the happiest person alive.<br>So… where shall we go, my love?</p>

    <div class="date-options" id="dateOptions">
      <button class="date-option" data-place="the beach">
        <span class="opt-icon">✦</span>
        <span class="opt-label">To the beach</span>
        <span class="opt-sub">sun, sand &amp; you</span>
      </button>
      <button class="date-option" data-place="Shack">
        <span class="opt-icon">♡</span>
        <span class="opt-label">To Shack</span>
        <span class="opt-sub">our little spot</span>
      </button>
      <button class="date-option" data-place="Leiria city">
        <span class="opt-icon">❀</span>
        <span class="opt-label">To Leiria city</span>
        <span class="opt-sub">a sweet stroll</span>
      </button>
      <button class="date-option" data-place="London">
        <span class="opt-icon">✿</span>
        <span class="opt-label">To London</span>
        <span class="opt-sub">a big adventure</span>
      </button>
    </div>

    <div class="final-message" id="finalMessage" hidden>
      <p id="finalText"></p>
    </div>
  </div>
</section>

<div class="rejection-modal" id="rejectionModal" hidden>
  <div class="big-cross-overlay" aria-hidden="true">
    <span class="cross-line cross-line-1"></span>
    <span class="cross-line cross-line-2"></span>
  </div>
  <div class="rejection-card">
    <p id="rejectionText"></p>
    <button class="try-again-btn" id="tryAgainBtn">Try again ♡</button>
  </div>
</div>

<button class="sound-hint" id="soundToggle">♪ play music</button>

<script>
  // ── floating heart background ──────────────────────────────────────────
  const heartBg = document.getElementById('heartBg');
  const heartChars = ['♡', '♥', '✿', '❀', '✦'];
  for (let i = 0; i < 28; i++) {
    const s = document.createElement('span');
    s.textContent = heartChars[Math.floor(Math.random() * heartChars.length)];
    s.style.left = Math.random() * 100 + 'vw';
    s.style.fontSize = (14 + Math.random() * 22) + 'px';
    s.style.animationDuration = (8 + Math.random() * 12) + 's';
    s.style.animationDelay = (Math.random() * 12) + 's';
    s.style.color = ['#ff7eb6', '#ffb3d1', '#ff5fa2', '#ffc8dd'][Math.floor(Math.random() * 4)];
    heartBg.appendChild(s);
  }

  // ── runaway "No" button ────────────────────────────────────────────────
  const noBtn  = document.getElementById('noBtn');
  const yesBtn = document.getElementById('yesBtn');
  const stage  = document.getElementById('stage');

  const noMessages = [
    'No', 'are you sure?', 'really?', 'think again!', 'pleaseee', 'no? :(',
    'one more chance', 'pretty please', 'reconsider?', 'don\'t be mean ♡',
    'last chance!', 'you can\'t catch me ♡'
  ];
  let noIndex = 0;

  const SAFE_MARGIN = 12;
  // play frame the No button is confined to — caps how far it can wander
  const PLAY_MAX_W = 900;
  const PLAY_MAX_H = 540;
  const PLAY_VIEWPORT_RATIO = 0.85; // never exceed this fraction of viewport

  // ── continuous DVD-style bounce for the No button ──────────────────────
  let noX = 0, noY = 0;
  let noVX = 0, noVY = 0;
  let noRunning = false;
  let noAngle = 0;       // current rotation in degrees
  let noAngleVel = 0;    // degrees per frame
  let lastFrameTime = 0;

  function getPlayBounds() {
    const w = Math.min(PLAY_MAX_W, window.innerWidth  * PLAY_VIEWPORT_RATIO);
    const h = Math.min(PLAY_MAX_H, window.innerHeight * PLAY_VIEWPORT_RATIO);
    const left = (window.innerWidth  - w) / 2;
    const top  = (window.innerHeight - h) / 2;
    return { left, top, right: left + w, bottom: top + h };
  }

  function clampInside() {
    const w = noBtn.offsetWidth;
    const h = noBtn.offsetHeight;
    const p = getPlayBounds();
    if (noX < p.left + SAFE_MARGIN) noX = p.left + SAFE_MARGIN;
    if (noY < p.top  + SAFE_MARGIN) noY = p.top  + SAFE_MARGIN;
    if (noX > p.right  - w - SAFE_MARGIN) noX = p.right  - w - SAFE_MARGIN;
    if (noY > p.bottom - h - SAFE_MARGIN) noY = p.bottom - h - SAFE_MARGIN;
  }

  function startBouncing() {
    if (noRunning) return;

    // lock current size into a fixed-position element starting at its current spot
    const rect = noBtn.getBoundingClientRect();
    noBtn.classList.add('bouncing');
    noBtn.style.position = 'fixed';
    noBtn.style.left = rect.left + 'px';
    noBtn.style.top  = rect.top  + 'px';
    noBtn.style.margin = '0';
    noX = rect.left;
    noY = rect.top;

    // initial velocity: random direction, gentle speed
    const speed = 1.4; // px per frame at 60fps
    const dir = Math.random() * Math.PI * 2;
    noVX = Math.cos(dir) * speed;
    noVY = Math.sin(dir) * speed;
    noAngleVel = (Math.random() * 2 - 1) * 0.25;

    noRunning = true;
    lastFrameTime = performance.now();
    requestAnimationFrame(tickNo);
  }

  function tickNo(now) {
    if (!noRunning) return;
    // delta-time scaling so it stays consistent across refresh rates
    const dt = Math.min(2.5, (now - lastFrameTime) / 16.6667);
    lastFrameTime = now;

    const w = noBtn.offsetWidth;
    const h = noBtn.offsetHeight;
    const p = getPlayBounds();
    const minX = p.left + SAFE_MARGIN;
    const minY = p.top  + SAFE_MARGIN;
    const maxX = p.right  - w - SAFE_MARGIN;
    const maxY = p.bottom - h - SAFE_MARGIN;

    noX += noVX * dt;
    noY += noVY * dt;

    let bounced = false;
    if (noX <= minX) { noX = minX; noVX =  Math.abs(noVX); bounced = true; }
    if (noX >= maxX) { noX = maxX; noVX = -Math.abs(noVX); bounced = true; }
    if (noY <= minY) { noY = minY; noVY =  Math.abs(noVY); bounced = true; }
    if (noY >= maxY) { noY = maxY; noVY = -Math.abs(noVY); bounced = true; }

    if (bounced) clampInside(); // just snap back inside on a wall hit

    noAngle += noAngleVel * dt;
    // keep angle small so the bbox stays close to axis-aligned
    if (noAngle >  12) { noAngle =  12; noAngleVel = -Math.abs(noAngleVel); }
    if (noAngle < -12) { noAngle = -12; noAngleVel =  Math.abs(noAngleVel); }

    noBtn.style.left = noX + 'px';
    noBtn.style.top  = noY + 'px';
    noBtn.style.transform = `rotate(${noAngle}deg)`;

    requestAnimationFrame(tickNo);
  }

  // only fires on click/tap — changes the message, kicks the direction,
  // and grows the Yes button. Hover does nothing.
  function onClickNo(e) {
    if (e) e.preventDefault();
    if (!noRunning) { startBouncing(); return; }

    // cycle the cheeky message
    noIndex = (noIndex + 1) % noMessages.length;
    noBtn.textContent = noMessages[noIndex];

    // randomize direction & give it a small kick
    const speed = 2.2;
    const dir = Math.random() * Math.PI * 2;
    noVX = Math.cos(dir) * speed;
    noVY = Math.sin(dir) * speed;
    noAngleVel = (Math.random() * 2 - 1) * 0.5;

    // grow the Yes button a tiny bit
    const currentScale = parseFloat(yesBtn.dataset.scale || '1');
    const nextScale = Math.min(currentScale + 0.06, 2.2);
    yesBtn.dataset.scale = nextScale;
    yesBtn.style.transform = `scale(${nextScale})`;

    // re-clamp in case the new text grew the button past the wall
    clampInside();
  }

  noBtn.addEventListener('click', onClickNo);
  noBtn.addEventListener('touchstart', onClickNo, { passive: false });

  // keep on-screen if the window resizes
  window.addEventListener('resize', () => {
    if (noRunning) clampInside();
  });

  // start bouncing shortly after load so the layout is readable first
  window.addEventListener('load', () => {
    setTimeout(startBouncing, 900);
  });

  // ── Yes click → celebration ────────────────────────────────────────────
  const celebration  = document.getElementById('celebration');
  const dateOptions  = document.getElementById('dateOptions');
  const finalMessage = document.getElementById('finalMessage');
  const finalText    = document.getElementById('finalText');
  const celebText    = document.getElementById('celebText');

  const placeData = {
    'the beach':   { correct: false, text: "you don't like sand that much, try again" },
    'Shack':       { correct: false, text: "we already go there when we play dbd" },
    'Leiria city': { correct: false, text: "do you wanna go study or what? try again" },
    'London':      { correct: true,  text: "i'm glad you choose this ♡<br>my holidays are in august — how does the 20th to the 25th sound?<br>all expenses paid, you can pay me back in kisses." }
  };

  const rejectionModal = document.getElementById('rejectionModal');
  const rejectionText  = document.getElementById('rejectionText');
  const tryAgainBtn    = document.getElementById('tryAgainBtn');

  yesBtn.addEventListener('click', () => {
    celebration.classList.add('show');
    startConfetti();
    if (audioCtx && !musicPlaying) toggleMusic(); // auto-start music on yes
  });

  dateOptions.addEventListener('click', (e) => {
    const opt = e.target.closest('.date-option');
    if (!opt || opt.disabled) return;

    const place = opt.dataset.place;
    const data  = placeData[place];
    if (!data) return;

    if (data.correct) {
      // London → success flow: lock in the choice, swap text, more confetti
      dateOptions.querySelectorAll('.date-option').forEach(b => {
        b.classList.remove('chosen');
        b.disabled = true;
        if (b !== opt) b.style.opacity = '0.45';
      });
      opt.classList.add('chosen');
      celebText.style.display = 'none';
      finalText.innerHTML = data.text;
      finalMessage.hidden = false;
      startConfetti();
    } else {
      // wrong pick → dramatic big X overlay with the cheeky reason
      showRejection(data.text);
    }
  });

  function showRejection(text) {
    rejectionText.textContent = text;
    rejectionModal.hidden = false;
    // next frame so the .show animation actually plays from start
    requestAnimationFrame(() => rejectionModal.classList.add('show'));
  }

  tryAgainBtn.addEventListener('click', () => {
    rejectionModal.classList.remove('show');
    setTimeout(() => { rejectionModal.hidden = true; }, 250);
  });

  // dismiss the rejection by clicking the backdrop too
  rejectionModal.addEventListener('click', (e) => {
    if (e.target === rejectionModal) tryAgainBtn.click();
  });

  function startConfetti() {
    const symbols = ['♡', '♥', '✿', '❀', '✦', '⋆'];
    const colors  = ['#ff5fa2', '#ff7eb6', '#ffb3d1', '#ff3d8b', '#ffc8dd'];
    for (let i = 0; i < 80; i++) {
      const c = document.createElement('span');
      c.className = 'confetti';
      c.textContent = symbols[Math.floor(Math.random() * symbols.length)];
      c.style.left = Math.random() * 100 + 'vw';
      c.style.color = colors[Math.floor(Math.random() * colors.length)];
      c.style.fontSize = (16 + Math.random() * 28) + 'px';
      c.style.animationDuration = (3 + Math.random() * 4) + 's';
      c.style.animationDelay = (Math.random() * 2) + 's';
      celebration.appendChild(c);
    }
  }

  // ── sweet piano melody (Web Audio, no external files) ──────────────────
  // a soft loop reminiscent of cute pastel j-pop / sanrio vibes
  let audioCtx = null;
  let musicPlaying = false;
  let musicTimer = null;
  let masterGain = null;

  // gentle melody (note name + duration in beats), in C major, sweet and bouncy
  const melody = [
    ['E5', 0.5], ['G5', 0.5], ['C6', 0.75], ['B5', 0.25], ['A5', 0.5], ['G5', 0.5],
    ['E5', 0.5], ['F5', 0.5], ['G5', 1.0],
    ['D5', 0.5], ['F5', 0.5], ['A5', 0.75], ['G5', 0.25], ['F5', 0.5], ['E5', 0.5],
    ['D5', 0.5], ['E5', 0.5], ['C5', 1.0],
  ];

  const noteFreq = {
    'C5': 523.25, 'D5': 587.33, 'E5': 659.25, 'F5': 698.46,
    'G5': 783.99, 'A5': 880.00, 'B5': 987.77, 'C6': 1046.50
  };

  function playNote(freq, startTime, duration) {
    // soft "piano-ish" sound: sine + triangle, with a quick attack & gentle decay
    const osc1 = audioCtx.createOscillator();
    const osc2 = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc1.type = 'sine';
    osc2.type = 'triangle';
    osc1.frequency.value = freq;
    osc2.frequency.value = freq * 2; // gentle upper harmonic

    const g2 = audioCtx.createGain();
    g2.gain.value = 0.15;
    osc2.connect(g2).connect(gain);
    osc1.connect(gain);

    gain.gain.setValueAtTime(0, startTime);
    gain.gain.linearRampToValueAtTime(0.28, startTime + 0.015);
    gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);

    gain.connect(masterGain);

    osc1.start(startTime);
    osc2.start(startTime);
    osc1.stop(startTime + duration + 0.05);
    osc2.stop(startTime + duration + 0.05);
  }

  function scheduleLoop() {
    const tempo = 1.0; // seconds per beat (slowish, sweet)
    let t = audioCtx.currentTime + 0.1;
    melody.forEach(([note, beats]) => {
      playNote(noteFreq[note], t, beats * tempo);
      t += beats * tempo;
    });
    // schedule next loop
    const loopLen = melody.reduce((s, [, b]) => s + b * tempo, 0);
    musicTimer = setTimeout(scheduleLoop, loopLen * 1000 - 100);
  }

  function toggleMusic() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 0.35;
      masterGain.connect(audioCtx.destination);
    }
    if (!musicPlaying) {
      audioCtx.resume();
      scheduleLoop();
      musicPlaying = true;
      document.getElementById('soundToggle').textContent = '♪ pause music';
    } else {
      clearTimeout(musicTimer);
      masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
      masterGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
      setTimeout(() => {
        audioCtx.suspend();
        masterGain.gain.value = 0.35;
      }, 500);
      musicPlaying = false;
      document.getElementById('soundToggle').textContent = '♪ play music';
    }
  }

  document.getElementById('soundToggle').addEventListener('click', toggleMusic);
</script>
</body>
</html>
