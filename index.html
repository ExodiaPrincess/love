<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>A little question for you ♡</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;500;600;700&family=Caveat:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'Quicksand', sans-serif;
    color: #6b3a52;
    background: linear-gradient(180deg, #ffe0ef 0%, #ffd1e3 50%, #ffc0d9 100%);
  }

  /* floating hearts background */
  .heart-bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .heart-bg span {
    position: absolute;
    bottom: -40px;
    color: #ffb3d1;
    opacity: 0.7;
    font-size: 22px;
    animation: float-up linear infinite;
    text-shadow: 0 0 6px rgba(255, 192, 217, 0.6);
  }
  @keyframes float-up {
    0%   { transform: translateY(0) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.8; }
    100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
  }

  /* clouds */
  .cloud {
    position: fixed;
    background: rgba(255, 255, 255, 0.6);
    border-radius: 50%;
    filter: blur(2px);
    z-index: 0;
    pointer-events: none;
  }
  .cloud::before, .cloud::after {
    content: "";
    position: absolute;
    background: inherit;
    border-radius: 50%;
  }
  .cloud.c1 { width: 180px; height: 60px; top: 8%; left: -50px; animation: drift 60s linear infinite; }
  .cloud.c1::before { width: 90px; height: 90px; top: -45px; left: 30px; }
  .cloud.c1::after  { width: 60px; height: 60px; top: -25px; left: 100px; }
  .cloud.c2 { width: 140px; height: 50px; top: 22%; right: -40px; animation: drift-rev 80s linear infinite; }
  .cloud.c2::before { width: 70px; height: 70px; top: -35px; left: 20px; }
  .cloud.c2::after  { width: 50px; height: 50px; top: -20px; left: 75px; }
  @keyframes drift     { from { transform: translateX(0); } to { transform: translateX(120vw); } }
  @keyframes drift-rev { from { transform: translateX(0); } to { transform: translateX(-120vw); } }

  /* main card */
  .stage {
    position: relative;
    z-index: 2;
    height: 100%;
    display: grid;
    place-items: center;
    padding: 24px;
  }

  .card {
    position: relative;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 3px solid #ffb3d1;
    border-radius: 32px;
    padding: 48px 56px;
    text-align: center;
    box-shadow:
      0 0 0 6px rgba(255, 255, 255, 0.6),
      0 20px 40px rgba(255, 105, 165, 0.25),
      0 0 60px rgba(255, 182, 213, 0.6);
    max-width: 560px;
    width: 100%;
    animation: pop-in 0.8s cubic-bezier(.22,1.4,.36,1) both;
  }

  @keyframes pop-in {
    0%   { transform: scale(0.7) rotate(-3deg); opacity: 0; }
    100% { transform: scale(1)   rotate(0deg);  opacity: 1; }
  }

  .card::before {
    content: "♡";
    position: absolute;
    top: -28px; left: 50%;
    transform: translateX(-50%);
    background: #ff7eb6;
    color: white;
    width: 56px; height: 56px;
    border-radius: 50%;
    display: grid; place-items: center;
    font-size: 28px;
    box-shadow: 0 4px 14px rgba(255, 126, 182, 0.5);
    animation: heartbeat 1.6s ease-in-out infinite;
  }
  @keyframes heartbeat {
    0%, 100% { transform: translateX(-50%) scale(1); }
    25%      { transform: translateX(-50%) scale(1.18); }
    50%      { transform: translateX(-50%) scale(0.95); }
    75%      { transform: translateX(-50%) scale(1.12); }
  }

  h1 {
    font-family: 'Pacifico', cursive;
    font-size: clamp(34px, 6vw, 54px);
    color: #ff5fa2;
    margin-bottom: 8px;
    text-shadow: 2px 2px 0 #fff, 4px 4px 0 rgba(255, 159, 200, 0.4);
    line-height: 1.1;
  }

  .subtitle {
    font-family: 'Caveat', cursive;
    font-size: clamp(20px, 2.6vw, 26px);
    color: #c25288;
    margin-bottom: 36px;
    opacity: 0.9;
  }

  .buttons {
    display: flex;
    gap: 24px;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    min-height: 64px;
    position: relative;
  }

  button {
    font-family: 'Quicksand', sans-serif;
    font-weight: 700;
    font-size: 20px;
    border: none;
    border-radius: 999px;
    padding: 16px 36px;
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    letter-spacing: 0.5px;
  }

  .yes-btn {
    background: linear-gradient(135deg, #ff7eb6 0%, #ff5fa2 100%);
    color: white;
    box-shadow: 0 6px 0 #d9407e, 0 10px 20px rgba(255, 95, 162, 0.4);
  }
  .yes-btn:hover {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 9px 0 #d9407e, 0 14px 26px rgba(255, 95, 162, 0.5);
  }
  .yes-btn:active {
    transform: translateY(2px) scale(1.02);
    box-shadow: 0 3px 0 #d9407e, 0 6px 12px rgba(255, 95, 162, 0.4);
  }

  .no-btn {
    background: white;
    color: #c25288;
    border: 2px solid #ffb3d1;
    box-shadow: 0 4px 0 #ffb3d1, 0 6px 12px rgba(255, 179, 209, 0.4);
    position: relative;
    transition: top 0.25s ease, left 0.25s ease, transform 0.25s ease;
  }

  /* celebration screen */
  .celebration {
    position: fixed;
    inset: 0;
    z-index: 10;
    display: none;
    place-items: center;
    text-align: center;
    padding: 24px;
    background: radial-gradient(circle at 50% 40%, #fff0f7 0%, #ffd1e3 60%, #ffb3d1 100%);
  }
  .celebration.show { display: grid; animation: fade-in 0.6s ease both; }
  @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }

  .celebration-content {
    position: relative;
    z-index: 2;
  }

  .celebration h2 {
    font-family: 'Pacifico', cursive;
    font-size: clamp(40px, 8vw, 80px);
    color: #ff3d8b;
    text-shadow: 3px 3px 0 #fff, 6px 6px 0 rgba(255, 159, 200, 0.5);
    margin-bottom: 16px;
    animation: wiggle 2s ease-in-out infinite;
  }
  @keyframes wiggle {
    0%, 100% { transform: rotate(-2deg); }
    50%      { transform: rotate(2deg); }
  }

  .celebration p {
    font-family: 'Caveat', cursive;
    font-size: clamp(24px, 3vw, 34px);
    color: #b03a72;
    max-width: 600px;
    margin: 0 auto 28px;
    line-height: 1.4;
  }

  .big-heart {
    font-size: clamp(80px, 14vw, 140px);
    display: inline-block;
    animation: big-beat 1.2s ease-in-out infinite;
    filter: drop-shadow(0 8px 20px rgba(255, 95, 162, 0.5));
  }
  @keyframes big-beat {
    0%, 100% { transform: scale(1); }
    25%      { transform: scale(1.2); }
    50%      { transform: scale(0.95); }
    75%      { transform: scale(1.15); }
  }

  /* confetti hearts on celebration */
  .confetti {
    position: absolute;
    top: -40px;
    font-size: 28px;
    animation: fall linear forwards;
    pointer-events: none;
  }
  @keyframes fall {
    0%   { transform: translateY(0) rotate(0); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0.4; }
  }

  /* sound hint */
  .sound-hint {
    position: fixed;
    bottom: 16px;
    right: 16px;
    z-index: 5;
    background: rgba(255, 255, 255, 0.75);
    border: 2px solid #ffb3d1;
    color: #c25288;
    font-family: 'Quicksand', sans-serif;
    font-weight: 600;
    font-size: 13px;
    padding: 8px 14px;
    border-radius: 999px;
    cursor: pointer;
    transition: transform 0.2s ease, background 0.2s ease;
  }
  .sound-hint:hover { transform: scale(1.05); background: white; }

  @media (max-width: 480px) {
    .card { padding: 36px 24px; }
    button { font-size: 17px; padding: 14px 28px; }
    .buttons { gap: 14px; }
  }
</style>
</head>
<body>

<div class="heart-bg" id="heartBg"></div>
<div class="cloud c1"></div>
<div class="cloud c2"></div>

<main class="stage" id="stage">
  <div class="card">
    <h1>Will you go out with me?</h1>
    <p class="subtitle">pretty please? ♡ with a cherry on top</p>
    <div class="buttons">
      <button class="yes-btn" id="yesBtn">Yes ♡</button>
      <button class="no-btn" id="noBtn">No</button>
    </div>
  </div>
</main>

<section class="celebration" id="celebration">
  <div class="celebration-content">
    <div class="big-heart">♡</div>
    <h2>I knew it! ♡</h2>
    <p>You just made me the happiest person alive.<br>Get ready for the cutest date ever, my love.</p>
  </div>
</section>

<button class="sound-hint" id="soundToggle">♪ play music</button>

<script>
  // ── floating heart background ──────────────────────────────────────────
  const heartBg = document.getElementById('heartBg');
  const heartChars = ['♡', '♥', '✿', '❀', '✦'];
  for (let i = 0; i < 28; i++) {
    const s = document.createElement('span');
    s.textContent = heartChars[Math.floor(Math.random() * heartChars.length)];
    s.style.left = Math.random() * 100 + 'vw';
    s.style.fontSize = (14 + Math.random() * 22) + 'px';
    s.style.animationDuration = (8 + Math.random() * 12) + 's';
    s.style.animationDelay = (Math.random() * 12) + 's';
    s.style.color = ['#ff7eb6', '#ffb3d1', '#ff5fa2', '#ffc8dd'][Math.floor(Math.random() * 4)];
    heartBg.appendChild(s);
  }

  // ── runaway "No" button ────────────────────────────────────────────────
  const noBtn  = document.getElementById('noBtn');
  const yesBtn = document.getElementById('yesBtn');
  const stage  = document.getElementById('stage');

  const noMessages = [
    'No', 'are you sure?', 'really?', 'think again!', 'pleaseee', 'no? :(',
    'one more chance', 'pretty please', 'reconsider?', 'don\'t be mean ♡',
    'last chance!', 'you can\'t catch me ♡'
  ];
  let noIndex = 0;

  const SAFE_MARGIN = 12;
  const MAX_ROTATE_DEG = 10;

  function clampNoButton() {
    // change text & rotation first, then measure the un-rotated size
    const rot = (Math.random() * 2 - 1) * MAX_ROTATE_DEG;
    noBtn.style.transform = 'rotate(0deg)'; // measure axis-aligned
    // force layout so offsetWidth/Height reflect the new text
    const w = noBtn.offsetWidth;
    const h = noBtn.offsetHeight;

    // bounding box of a rotated rectangle
    const rad = Math.abs(rot) * Math.PI / 180;
    const bboxW = w * Math.cos(rad) + h * Math.sin(rad);
    const bboxH = w * Math.sin(rad) + h * Math.cos(rad);

    // extra padding caused by rotation, applied on each side
    const padX = (bboxW - w) / 2;
    const padY = (bboxH - h) / 2;

    const minX = SAFE_MARGIN + padX;
    const minY = SAFE_MARGIN + padY;
    const maxX = window.innerWidth  - w - SAFE_MARGIN - padX;
    const maxY = window.innerHeight - h - SAFE_MARGIN - padY;

    // if the viewport is somehow smaller than the button, fall back to top-left
    const rangeX = Math.max(0, maxX - minX);
    const rangeY = Math.max(0, maxY - minY);

    const newX = Math.floor(minX + Math.random() * rangeX);
    const newY = Math.floor(minY + Math.random() * rangeY);

    noBtn.style.position = 'fixed';
    noBtn.style.left = newX + 'px';
    noBtn.style.top  = newY + 'px';
    noBtn.style.transform = `rotate(${rot}deg)`;
  }

  function dodge() {
    // change the label first so the new size is what we clamp against
    noIndex = (noIndex + 1) % noMessages.length;
    noBtn.textContent = noMessages[noIndex];

    clampNoButton();

    // every dodge, also grow the yes button a little
    const currentScale = parseFloat(yesBtn.dataset.scale || '1');
    const nextScale = Math.min(currentScale + 0.08, 2.2);
    yesBtn.dataset.scale = nextScale;
    yesBtn.style.transform = `scale(${nextScale})`;
  }

  // keep the No button on-screen if the window is resized after it has moved
  window.addEventListener('resize', () => {
    if (noBtn.style.position === 'fixed') {
      // re-clamp current position without changing the text
      const rect = noBtn.getBoundingClientRect();
      const w = noBtn.offsetWidth;
      const h = noBtn.offsetHeight;
      const maxLeft = window.innerWidth  - w - SAFE_MARGIN;
      const maxTop  = window.innerHeight - h - SAFE_MARGIN;
      const left = Math.min(Math.max(SAFE_MARGIN, rect.left), maxLeft);
      const top  = Math.min(Math.max(SAFE_MARGIN, rect.top),  maxTop);
      noBtn.style.left = left + 'px';
      noBtn.style.top  = top  + 'px';
    }
  });

  noBtn.addEventListener('mouseover', dodge);
  noBtn.addEventListener('mouseenter', dodge);
  noBtn.addEventListener('focus', dodge);
  // touch devices: dodge when tapped
  noBtn.addEventListener('touchstart', (e) => { e.preventDefault(); dodge(); }, { passive: false });
  noBtn.addEventListener('click', (e) => { e.preventDefault(); dodge(); });

  // ── Yes click → celebration ────────────────────────────────────────────
  const celebration = document.getElementById('celebration');
  yesBtn.addEventListener('click', () => {
    celebration.classList.add('show');
    startConfetti();
    if (audioCtx && !musicPlaying) toggleMusic(); // auto-start music on yes
  });

  function startConfetti() {
    const symbols = ['♡', '♥', '✿', '❀', '✦', '⋆'];
    const colors  = ['#ff5fa2', '#ff7eb6', '#ffb3d1', '#ff3d8b', '#ffc8dd'];
    for (let i = 0; i < 80; i++) {
      const c = document.createElement('span');
      c.className = 'confetti';
      c.textContent = symbols[Math.floor(Math.random() * symbols.length)];
      c.style.left = Math.random() * 100 + 'vw';
      c.style.color = colors[Math.floor(Math.random() * colors.length)];
      c.style.fontSize = (16 + Math.random() * 28) + 'px';
      c.style.animationDuration = (3 + Math.random() * 4) + 's';
      c.style.animationDelay = (Math.random() * 2) + 's';
      celebration.appendChild(c);
    }
  }

  // ── sweet piano melody (Web Audio, no external files) ──────────────────
  // a soft loop reminiscent of cute pastel j-pop / sanrio vibes
  let audioCtx = null;
  let musicPlaying = false;
  let musicTimer = null;
  let masterGain = null;

  // gentle melody (note name + duration in beats), in C major, sweet and bouncy
  const melody = [
    ['E5', 0.5], ['G5', 0.5], ['C6', 0.75], ['B5', 0.25], ['A5', 0.5], ['G5', 0.5],
    ['E5', 0.5], ['F5', 0.5], ['G5', 1.0],
    ['D5', 0.5], ['F5', 0.5], ['A5', 0.75], ['G5', 0.25], ['F5', 0.5], ['E5', 0.5],
    ['D5', 0.5], ['E5', 0.5], ['C5', 1.0],
  ];

  const noteFreq = {
    'C5': 523.25, 'D5': 587.33, 'E5': 659.25, 'F5': 698.46,
    'G5': 783.99, 'A5': 880.00, 'B5': 987.77, 'C6': 1046.50
  };

  function playNote(freq, startTime, duration) {
    // soft "piano-ish" sound: sine + triangle, with a quick attack & gentle decay
    const osc1 = audioCtx.createOscillator();
    const osc2 = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc1.type = 'sine';
    osc2.type = 'triangle';
    osc1.frequency.value = freq;
    osc2.frequency.value = freq * 2; // gentle upper harmonic

    const g2 = audioCtx.createGain();
    g2.gain.value = 0.15;
    osc2.connect(g2).connect(gain);
    osc1.connect(gain);

    gain.gain.setValueAtTime(0, startTime);
    gain.gain.linearRampToValueAtTime(0.28, startTime + 0.015);
    gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);

    gain.connect(masterGain);

    osc1.start(startTime);
    osc2.start(startTime);
    osc1.stop(startTime + duration + 0.05);
    osc2.stop(startTime + duration + 0.05);
  }

  function scheduleLoop() {
    const tempo = 1.0; // seconds per beat (slowish, sweet)
    let t = audioCtx.currentTime + 0.1;
    melody.forEach(([note, beats]) => {
      playNote(noteFreq[note], t, beats * tempo);
      t += beats * tempo;
    });
    // schedule next loop
    const loopLen = melody.reduce((s, [, b]) => s + b * tempo, 0);
    musicTimer = setTimeout(scheduleLoop, loopLen * 1000 - 100);
  }

  function toggleMusic() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 0.35;
      masterGain.connect(audioCtx.destination);
    }
    if (!musicPlaying) {
      audioCtx.resume();
      scheduleLoop();
      musicPlaying = true;
      document.getElementById('soundToggle').textContent = '♪ pause music';
    } else {
      clearTimeout(musicTimer);
      masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
      masterGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
      setTimeout(() => {
        audioCtx.suspend();
        masterGain.gain.value = 0.35;
      }, 500);
      musicPlaying = false;
      document.getElementById('soundToggle').textContent = '♪ play music';
    }
  }

  document.getElementById('soundToggle').addEventListener('click', toggleMusic);
</script>
</body>
</html>
